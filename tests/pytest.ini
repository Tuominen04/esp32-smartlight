[pytest]
# pytest configuration for ESP32 Smart Light tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for categorizing tests
markers =
    unit: Unit tests that can run quickly
    system: System integration tests requiring hardware
    slow: Tests that take a long time to run

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Output configuration
addopts =
    -v
    --tb=short
    --color=yes
    --junit-xml=test-results/junit.xml

# Test paths
testpaths = .

# Ignore patterns
norecursedirs = build* sdkconfig* .git .github
