name: Run Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-unit-tests:
    name: Build and Run Unit Tests
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build unit tests (linux target)
        working-directory: tests/unit
        run: |
          . $IDF_PATH/export.sh
          idf.py --preview set-target linux
          idf.py build

      - name: Run unit tests
        working-directory: tests/unit
        run: ./build/unit_test_app.elf
        
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [build-unit-tests]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## Test Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✓ Unit tests built and ran (linux target): ${{ needs.build-unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✓ Test builds complete" >> $GITHUB_STEP_SUMMARY
