name: Run Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-unit-tests:
    name: Build Unit Tests
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build unit tests
        working-directory: tests/unit
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target esp32c6
          idf.py build

      - name: Upload unit test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-build
          path: tests/unit/build/
          retention-days: 7

  build-system-tests:
    name: Build System Tests
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build system tests
        working-directory: tests/system
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target esp32c6
          idf.py build

      - name: Upload system test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: system-test-build
          path: tests/system/build/
          retention-days: 7

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [build-unit-tests, build-system-tests]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## Test Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✓ Unit tests build: ${{ needs.build-unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✓ System tests build: ${{ needs.build-system-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✓ Test builds complete" >> $GITHUB_STEP_SUMMARY
